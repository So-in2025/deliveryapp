<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    
    <!-- PWA / Mobile Capabilities -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="https://res.cloudinary.com/dfrb7fkni/image/upload/w_64,h_64,c_fill,f_png/v1775205995/117a5ec6-76ad-444d-ade2-7077d936ded3_ubbnbi.jpg" type="image/png" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Te lo Llevo" />
    
    <!-- iOS Icon -->
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dfrb7fkni/image/upload/w_180,h_180,c_fill,f_png/v1775205995/117a5ec6-76ad-444d-ade2-7077d936ded3_ubbnbi.jpg" />
    
    <title>Te lo Llevo</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
      /* --- Native App Simulation CSS --- */
      
      /* Disable text selection globally to feel like an app */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* Re-enable text selection for inputs */
      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }

      html { 
        -webkit-tap-highlight-color: transparent; 
        background-color: #ffffff;
        scroll-behavior: smooth;
      }
      
      body { 
        background-color: #ffffff;
        overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
        transition: background-color 0.3s ease;
      }

      /* Dark Mode Global Overrides */
      html.dark, html.dark body {
        background-color: #0c0a09; /* Stone-950 */
      }
      
      /* Hide Scrollbar for cleaner UI */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Safe Area for iPhones */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }

      /* Premium Glassmorphism */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .dark .glass {
        background: rgba(12, 10, 9, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Shimmer Effect */
      .shimmer-bg {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        background-size: 200% 100%;
        animation: shimmer 2s infinite linear;
      }
    </style>
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
